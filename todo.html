<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="todo-style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO app</title>
</head>
<body>
    <h1 align="center">TODO List</h1>
    <!--<h2><marquee>ADD details</h2>-->
    <div align="center"  style="background-color: #3c3c3c; padding: 20px; border-radius: 10px;">
    
    <input type="text" id="task-input" placeholder="enter task">
    <input type="date" id="date-input" placeholder="enter the date">
    <button id="btn" onclick="addtask();">Add</button><br>
    </div>
    <div id="list"></div>
</body>
</html>
<script>
    todos=[];
    function addtask(){
        let task =document.querySelector("#task-input").value;
        let date=document.querySelector("#date-input").value;

        todos.push({
            taskname:task,
            taskdate:date, });
            display();
            console.log(todos);
    }

    function display(){
        let result="";

        for(let i=0;i<todos.length;i++){
             result +=` 
             <span>
                ${todos[i].taskname}-${todos[i].taskdate}
            </span><br>
            `;}
        document.querySelector("#list").innerHTML=result;
}
</script>
