<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="password" id="username" placeholder="enter your name">
    <button id="btn" onclick="toggle()">show password</button>
    <button onclick="submit()">submit</button>
    <h1 id="greeting"></h1>
    
</body>
<script>
    function toggle(){
        let password=document.querySelector("#username");

        if(password.type='text'){
            password.type="password";
        }
        else{
            password.type="text";   
        }
    }
    function submit(){
       let name=document.querySelector("#username").value; //value is used to get the value of input field
        let heading=document.querySelector("greeting");
        heading.innerText="welcome"+name;
    }
</script>
</html>
